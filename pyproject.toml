[project]
name = "oellm"
version = "0.1.0"
description = "OpenEuroLLM CLI"
readme = "README.md"
requires-python = ">=3.12,<3.13"
dependencies = [
    "pandas",
    "typer",
    "datasets<4.0.0",
    "rich",
    "huggingface_hub",
    "pyyaml",
    "ijson",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.4.1",
    "pytest-timeout>=2.3.1",
    "pre-commit",
]
image = [
    "lmms-eval @ git+https://github.com/EvolvingLMMs-Lab/lmms-eval.git",
]
video = [
    "lmms-eval @ git+https://github.com/EvolvingLMMs-Lab/lmms-eval.git",
]
# Audio uses lmms-eval's audio tasks + runtime audio libraries.
# librosa / soundfile / jiwer are needed by lmms-eval's WER/CER metrics and
# audio loaders; they are not pulled in by the core install. The Singularity
# container image for HPC deployments must also include ffmpeg.
audio = [
    "lmms-eval @ git+https://github.com/EvolvingLMMs-Lab/lmms-eval.git",
    "soundfile",
    "librosa",
    "jiwer",
]

[project.scripts]
oellm = "oellm.main:main"

[build-system]
requires = ["uv_build>=0.7.19,<0.8.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "oellm"
module-root = ""
include = ["oellm/resources/*", "oellm/resources/**/*"]

[tool.ruff]
line-length = 90
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
]
ignore = [
    "E501",  # line too long
    "B008",  # do not perform function calls in argument defaults
    "C901",  # too complex
    "W191",  # indentation contains tabs
]

[tool.ruff.lint.isort]
known-first-party = ["oellm"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
