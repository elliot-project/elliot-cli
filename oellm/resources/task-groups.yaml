  # Explicit headline-metric picks for groups that would otherwise ride the
  # METRIC_FALLBACK_KEYS chain:
  #  * belebele (plain): acc — the paper convention; the _cf variants stay
  #    acc_norm.
  #  * mgsm: exact_match under the flexible-extract filter — CoT output
  #    formats vary across languages, and strict-match scores differ by
  #    several points.
  #  * gsm8k: exact_match under strict-match — the benchmark's original
  #    strict answer extraction; English output is format-stable, unlike
  #    multilingual mgsm above.
  #  * ifeval: prompt_level_strict_acc — the usual single-number pick.
  #  * The evalchemy-routed `reasoning` tasks (GPQADiamond, MATH500,
  #    LiveCodeBench, HumanEval, AIME24/25, AMC23) stay unmapped: output
  #    key shape unverified. The scheduler warns about unmapped tasks.
  gsm8k: exact_match,strict-match
  ifeval: prompt_level_strict_acc
