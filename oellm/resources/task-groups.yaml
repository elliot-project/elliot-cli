  mathvista_testmini_cot: llm_as_judge_eval
  mathvista_testmini_format: llm_as_judge_eval
  mathvista_testmini_solution: llm_as_judge_eval
  # lmms-eval video benchmark metrics. `video_mmmu` is a group of 3 leaves.
  video_mmmu_perception: mmmu_acc
  video_mmmu_comprehension: mmmu_acc
  video_mmmu_adaptation: mmmu_acc
  # EgoSchema: use `egoschema_subset` (val split with ground truth).
  # The bare `egoschema` task is Kaggle-submission-only.
  egoschema_subset: score
  # MVBench: `mvbench` is a group of 20 subtasks; collect_results
  # aggregates per-subtask `mvbench_accuracy` into a synthetic row.
  mvbench: mvbench_accuracy
  # `videomme_perception_score` IS the overall accuracy despite the name.
  videomme: videomme_perception_score
  # ActivityNet-QA requires GPT API access for evaluation (LLM-as-judge)
  activitynetqa: gpt_eval_accuracy
