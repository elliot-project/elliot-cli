task_groups:
  sib200-eu:
    description: "SIB-200 European language topic classification tasks (0-shot)"
    suite: lm-eval-harness
    n_shots: [0]
    dataset: Davlan/sib200
    valid_langs: [bul_Cyrl, hrv_Latn, ces_Latn, dan_Latn, nld_Latn, eng_Latn, est_Latn, fin_Latn,
                  fra_Latn, deu_Latn, ell_Grek, hun_Latn, gle_Latn, ita_Latn, lvs_Latn, lit_Latn,
                  mlt_Latn, pol_Latn, por_Latn, ron_Latn, slk_Latn, slv_Latn, spa_Latn, swe_Latn,
                  cat_Latn, eus_Latn, glg_Latn, bos_Latn, kat_Geor, mkd_Cyrl, als_Latn, srp_Cyrl,
                  tur_Latn, ukr_Cyrl, isl_Latn, nob_Latn]
    tasks:
      - task: "sib200_{lang}"
        subset: "{lang}"
  open-sci-0.01:
    description: "open-sci-ref 0.01 evals"
    suite: lm-eval-harness
    tasks:
      - task: copa
        n_shots: [0]
        dataset: aps/super_glue
        subset: copa
      - task: social_iqa
        n_shots: [0]
        dataset: allenai/social_i_qa
      - task: openbookqa
        n_shots: [0]
        dataset: allenai/openbookqa
      - task: lambada_openai
        n_shots: [0]
        dataset: EleutherAI/lambada_openai
      - task: winogrande
        n_shots: [0]
        dataset: allenai/winogrande
        subset: winogrande_xl
      - task: mmlu
        n_shots: [5]
        dataset: cais/mmlu
      - task: hellaswag
        n_shots: [10]
        dataset: Rowan/hellaswag
      - task: arc_easy
        n_shots: [10]
        dataset: allenai/ai2_arc
        subset: ARC-Easy
      - task: arc_challenge
        n_shots: [10]
        dataset: allenai/ai2_arc
        subset: ARC-Challenge
      - task: commonsense_qa
        n_shots: [10]
        dataset: tau/commonsense_qa
      - task: piqa
        n_shots: [10]
        dataset: baber/piqa
      - task: boolq
        n_shots: [10]
        dataset: aps/super_glue
        subset: boolq
  belebele-eu-5-shot:
    description: "Belebele European language tasks"
    suite: lm-eval-harness
    n_shots: [5]
    dataset: facebook/belebele
    valid_langs: [bul_Cyrl, hrv_Latn, ces_Latn, dan_Latn, nld_Latn, eng_Latn, est_Latn, fin_Latn,
                  fra_Latn, deu_Latn, ell_Grek, hun_Latn, ita_Latn, lvs_Latn, lit_Latn, mlt_Latn,
                  pol_Latn, por_Latn, ron_Latn, slk_Latn, slv_Latn, spa_Latn, swe_Latn, nob_Latn]
    tasks:
      - task: "belebele_{lang}"
        subset: "{lang}"
  belebele-eu-cf:
    description: "Belebele European language tasks (cloze formulation, lighteval)"
    suite: lighteval
    n_shots: [0]
    dataset: facebook/belebele
    valid_langs: [bul_Cyrl, hrv_Latn, ces_Latn, dan_Latn, nld_Latn, eng_Latn, est_Latn, fin_Latn,
                  fra_Latn, deu_Latn, ell_Grek, hun_Latn, ita_Latn, lvs_Latn, lit_Latn, mlt_Latn,
                  pol_Latn, por_Latn, ron_Latn, slk_Latn, slv_Latn, spa_Latn, swe_Latn, nob_Latn,
                  eus_Latn, cat_Latn]
    tasks:
      - task: "belebele_{lang}_cf"
        subset: "{lang}"

  xcsqa-eu:
    description: "XCSQA EU commonsense QA (0-shot MCQ, acc_norm)"
    suite: lm-eval-harness
    n_shots: [0]
    dataset: INK-USC/xcsr
    tasks:
      - task: xcsqa_deu_Latn
        subset: X-CSQA-de
      - task: xcsqa_eng_Latn
        subset: X-CSQA-en
      - task: xcsqa_spa_Latn
        subset: X-CSQA-es
      - task: xcsqa_fra_Latn
        subset: X-CSQA-fr
      - task: xcsqa_ita_Latn
        subset: X-CSQA-it
      - task: xcsqa_nld_Latn
        subset: X-CSQA-nl
      - task: xcsqa_pol_Latn
        subset: X-CSQA-pl
      - task: xcsqa_por_Latn
        subset: X-CSQA-pt

  flores-200-eu-to-eng:
    description: "Flores 200 EU to English translation"
    suite: lighteval
    n_shots: [0]
    dataset: facebook/flores
    valid_langs: [bul_Cyrl, ces_Latn, dan_Latn, deu_Latn, ell_Grek, est_Latn, fin_Latn, fra_Latn,
                  gle_Latn, hrv_Latn, hun_Latn, ita_Latn, lit_Latn, lvs_Latn, mlt_Latn, nld_Latn,
                  pol_Latn, por_Latn, ron_Latn, slk_Latn, slv_Latn, spa_Latn, swe_Latn]
