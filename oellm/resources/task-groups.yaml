  # top-level `mathvista_testmini` is a GROUP that expands to the three
  # leaves below — schedule the leaves, not the group.
  mathvista_testmini_cot: llm_as_judge_eval
  mathvista_testmini_format: llm_as_judge_eval
  mathvista_testmini_solution: llm_as_judge_eval
  # lmms-eval video benchmark metrics. `video_mmmu` upstream is a GROUP
  # that expands to perception / comprehension / adaptation leaves.
  video_mmmu_perception: mmmu_acc
  video_mmmu_comprehension: mmmu_acc
  video_mmmu_adaptation: mmmu_acc
  egoschema: submission
  videomme: videomme_perception_score
