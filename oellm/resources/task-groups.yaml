    suite: lmms_eval
    n_shots: [0]
    tasks:
      - task: mme
        dataset: lmms-lab/MME

  image-mathvista:
    description: "MathVista mathematical reasoning in visual contexts via lmms-eval (testmini CoT/format/solution leaves)"
    suite: lmms_eval
    n_shots: [0]
    dataset: AI4Math/MathVista
    tasks:
      - task: mathvista_testmini_cot
      - task: mathvista_testmini_format
      - task: mathvista_testmini_solution

  # ── Video Modality (lmms-eval) ────────────────────────────────────────────
  video-understanding:
    description: "Video understanding benchmarks via lmms-eval (VideoMMMU, MVBench, EgoSchema-subset, VideoMME, ActivityNet-QA, LongVideoBench)"
    suite: lmms_eval
    n_shots: [0]
    tasks:
      - task: video_mmmu_perception
        dataset: lmms-lab/VideoMMMU
      - task: video_mmmu_comprehension
        dataset: lmms-lab/VideoMMMU
      - task: video_mmmu_adaptation
        dataset: lmms-lab/VideoMMMU
      - task: mvbench
        dataset: OpenGVLab/MVBench
        # MVBench parquet on `main`, .mp4 files on `video` — fetch both.
        revisions: [main, video]
      - task: egoschema_subset
        dataset: lmms-lab/egoschema
      - task: videomme
        dataset: lmms-lab/Video-MME
      - task: activitynetqa
