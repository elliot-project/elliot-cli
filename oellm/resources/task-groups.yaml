  # ── Image Modality (lmms-eval) ────────────────────────────────────────────
  image-vqa:
    description: "Image VQA benchmarks via lmms-eval (VQAv2, MMBench, MMMU, ChartQA, DocVQA, TextVQA, OCRBench, MathVista)"
    suite: lmms_eval
    n_shots: [0]
    tasks:
      - task: vqav2_val
        dataset: lmms-lab/VQAv2
      - task: mmbench_en_dev
        dataset: lmms-lab/MMBench
      - task: mmmu_val
        dataset: MMMU/MMMU
      - task: chartqa
        dataset: lmms-lab/ChartQA
      - task: docvqa_val
        dataset: lmms-lab/DocVQA
        subset: DocVQA
      - task: textvqa_val
        dataset: facebook/textvqa
      - task: ocrbench
        dataset: echo840/OCRBench
      - task: mathvista_testmini_cot
        dataset: AI4Math/MathVista
      - task: mathvista_testmini_format
        dataset: AI4Math/MathVista
      - task: mathvista_testmini_solution
        dataset: AI4Math/MathVista

  # ── Individual Image Benchmarks (single-task groups for targeted runs) ──────
  image-vqav2:
    description: "VQAv2 visual question answering via lmms-eval"
    suite: lmms_eval
    n_shots: [0]
    tasks:
      - task: vqav2_val
        dataset: lmms-lab/VQAv2

  image-mmbench:
    description: "MMBench multi-modal benchmark via lmms-eval"
    suite: lmms_eval
    n_shots: [0]
    tasks:
      - task: mmbench_en_dev
        dataset: lmms-lab/MMBench

  image-mmmu:
    description: "MMMU massive multi-discipline multimodal understanding via lmms-eval"
    suite: lmms_eval
    n_shots: [0]
    tasks:
      - task: mmmu_val
        dataset: MMMU/MMMU

  image-chartqa:
    description: "ChartQA chart question answering via lmms-eval"
    suite: lmms_eval
    n_shots: [0]
    tasks:
      - task: chartqa
        dataset: lmms-lab/ChartQA

  image-docvqa:
    description: "DocVQA document visual question answering via lmms-eval"
    suite: lmms_eval
    n_shots: [0]
    tasks:
      - task: docvqa_val
        dataset: lmms-lab/DocVQA
