  # lmms-eval image benchmark metrics.
  # NOTE: `exact_match` for vqav2/textvqa is a lmms-eval misnomer — it's
  # the soft VQA accuracy `min(matching/3, 1)`, not strict equality.
  vqav2_val: exact_match
