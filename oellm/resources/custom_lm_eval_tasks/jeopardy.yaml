task: jeopardy
dataset_path: openeurollm/jeopardy
test_split: test
fewshot_split: test
output_type: generate_until
doc_to_text: "{{context}}\nAnswer:"
doc_to_target: "{{continuation}}"
target_delimiter: " "
fewshot_delimiter: "\n"
should_decontaminate: true
doc_to_decontamination_query: context
generation_kwargs:
  until:
    - "\n"
  do_sample: false
  temperature: 0.0
  max_gen_toks: 48
filter_list:
  - name: strict-match
    filter:
      - function: remove_whitespace
      - function: take_first
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
metadata:
  version: 1.0
